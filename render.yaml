services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: edupath-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: edupath-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://edupath-frontend.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false   # You will fill this in on the Render dashboard

  # ── Frontend (React) ───────────────────────────────────────────────────────
  - type: web
    name: edupath-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_BASE_URL
        value: https://edupath-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL Database ────────────────────────────────────────────────────
databases:
  - name: edupath-db
    databaseName: edupath_ai
    user: edupath_user
    plan: free
